<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analisi Convenienza Energetica</title>
    <style>
        :root { --emerald: #40b093; --dark: #2a8a72; --red: #e74c3c; --bg: #f4f7f6; }
        body { font-family: sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 15px; margin: 0; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 420px; box-sizing: border-box; }
        h1 { color: var(--dark); text-align: center; text-transform: uppercase; font-size: 18px; margin-bottom: 20px; font-weight: 800; }
        .section { background: var(--emerald); color: white; padding: 10px; border-radius: 10px; text-align: center; font-weight: bold; margin: 15px 0; font-size: 13px; text-transform: uppercase; }
        .section.old { background: var(--red); }
        label { display: block; font-size: 11px; font-weight: bold; margin: 12px 0 5px; color: #444; line-height: 1.2; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e0e6ed; border-radius: 10px; box-sizing: border-box; font-size: 15px; background: #fff; }
        .btn-group { display: flex; gap: 8px; }
        .btn { flex: 1; padding: 12px; border: 2px solid #e0e6ed; background: white; border-radius: 10px; cursor: pointer; font-size: 12px; font-weight: bold; color: #666; }
        .btn.active { background: var(--emerald); color: white; border-color: var(--emerald); }
        .anter-box { background: #f0fff4; border: 1px dashed var(--dark); padding: 10px; border-radius: 10px; color: var(--dark); font-size: 11px; text-align: center; font-weight: bold; margin: 15px 0; }
        .calc-btn { width: 100%; padding: 18px; background: var(--dark); color: white; border: none; border-radius: 15px; font-size: 18px; font-weight: bold; margin-top: 15px; cursor: pointer; }
        .results { display: flex; gap: 10px; margin-top: 20px; }
        .res-box { flex: 1; padding: 15px; border-radius: 15px; border: 2px solid #e0e6ed; text-align: center; background: #fff; }
        .res-box.highlight { border-color: var(--emerald); background: #f0fff4; }
        .res-label { font-size: 9px; font-weight: bold; color: #888; display: block; margin-bottom: 5px; }
        .res-val { font-size: 18px; font-weight: 800; color: var(--dark); }
    </style>
</head>
<body>

<div class="card">
    <h1>Analisi Convenienza</h1>

    <div class="section">Nostra Offerta</div>
    
    <label>Tipo Bolletta</label>
    <div class="btn-group">
        <button id="m-btn" class="btn active" onclick="setTipo(true)">Mensile</button>
        <button id="b-btn" class="btn" onclick="setTipo(false)">Bimestrale</button>
    </div>

    <label>Fase Contrattuale</label>
    <div class="btn-group">
        <button id="p1-btn" class="btn active" onclick="setFase(true)">Primi 3 Mesi</button>
        <button id="p2-btn" class="btn" onclick="setFase(false)">Dal 4° Mese</button>
    </div>

    <div id="area-m">
        <label>PUN di riferimento</label>
        <select id="pun-m">
            <option value="0.13266">Gennaio '26 (0,13266)</option>
            <option value="0.11441">Febbraio '26 (0,11441)</option>
            <option value="0.14340">Marzo '26 (0,14340)</option>
        </select>
        <label>Consumo kWh del Mese</label>
        <input type="number" id="kwh-m" placeholder="es. 300">
    </div>

    <div id="area-b" style="display:none;">
        <label>PUN Mesi</label>
        <div style="display:flex; gap:5px; margin-bottom:10px;">
            <select id="pb1"><option value="0.13266">Gen '26</option></select>
            <select id="pb2"><option value="0.11441" selected>Feb '26</option></select>
        </div>
        <div style="display:flex; gap:5px;">
            <div style="flex:1"><label>kWh Mese 1</label><input type="number" id="kb1" placeholder="kWh"></div>
            <div style="flex:1"><label>kWh Mese 2</label><input type="number" id="kb2" placeholder="kWh"></div>
        </div>
    </div>

    <label>Numero Amici Invitati</label>
    <input type="number" id="amici" placeholder="0">

    <div class="anter-box">
        SOSTIENI L'AMBIENTE CON ANTER<br>
        +5€ DA AGGIUNGERE SUL PRIMO MESE
    </div>

    <div class="section old">Vecchio Fornitore</div>
    
    <label>QUOTA CONSUMI <br>(di cui spesa per la vendita di energia elettrica €)</label>
    <input type="number" id="v-c" placeholder="es. 55.20">
    
    <label>QUOTA FISSA <br>(di cui spesa per la vendita di energia elettrica €)</label>
    <input type="number" id="v-f" placeholder="es. 12.00">

    <button class="calc-btn" onclick="calcola()">ESEGUI CONFRONTO</button>

    <div class="results">
        <div class="res-box">
            <span class="res-label">COSTO ATTUALE</span>
            <span class="res-val" id="out-v">€ 0.00</span>
        </div>
        <div class="res-box highlight">
            <span class="res-label">NOSTRA STIMA</span>
            <span class="res-val" id="out-n">€ 0.00</span>
        </div>
    </div>
</div>

<script>
    let isM = true;
    let isP = true;

    function setTipo(v) {
        isM = v;
        document.getElementById('m-btn').className = v ? 'btn active' : 'btn';
        document.getElementById('b-btn').className = v ? 'btn' : 'btn active';
        document.getElementById('area-m').style.display = v ? 'block' : 'none';
        document.getElementById('area-b').style.display = v ? 'none' : 'block';
    }

    function setFase(v) {
        isP = v;
        document.getElementById('p1-btn').className = v ? 'btn active' : 'btn';
        document.getElementById('p2-btn').className = v ? 'btn' : 'btn active';
    }

    function calcola() {
        let kwh = 0, pun = 0;
        if(isM) {
            kwh = parseFloat(document.getElementById('kwh-m').value) || 0;
            pun = parseFloat(document.getElementById('pun-m').value);
        } else {
            let k1 = parseFloat(document.getElementById('kb1').value) || 0;
            let k2 = parseFloat(document.getElementById('kb2').value) || 0;
            kwh = (k1 + k2) / 2;
            pun = (0.13266 + 0.11441) / 2;
        }

        const spread = 0.0374, ccv = 11.61;
        const nAmici = parseInt(document.getElementById('amici').value) || 0;
        let stima = (kwh * (pun + spread)) + ccv;
        
        if(isP) { stima = stima - 10 - (nAmici * 10); } 
        else { stima = stima - (nAmici * 2); }

        let vC = parseFloat(document.getElementById('v-c').value) || 0;
        let vF = parseFloat(document.getElementById('v-f').value) || 0;
        let totV = isM ? (vC + vF) : ((vC + vF) / 2);

        document.getElementById('out-n').innerText = "€ " + Math.max(0, stima).toFixed(2);
        document.getElementById('out-v').innerText = "€ " + totV.toFixed(2);
    }
</script>
</body>
</html>
