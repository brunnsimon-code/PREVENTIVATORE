<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Analisi Energetica</title>
    <style>
        :root { --emerald: #40b093; --dark: #2a8a72; --red: #e74c3c; --bg: #f4f7f6; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 10px; margin: 0; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; box-sizing: border-box; }
        h1 { color: var(--dark); text-align: center; text-transform: uppercase; font-size: 18px; margin: 0 0 15px 0; font-weight: 800; }
        .section { background: var(--emerald); color: white; padding: 10px; border-radius: 10px; text-align: center; font-weight: bold; margin: 10px 0; font-size: 12px; text-transform: uppercase; }
        .section.old { background: var(--red); }
        label { display: block; font-size: 11px; font-weight: bold; margin: 10px 0 5px; color: #444; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e0e6ed; border-radius: 10px; box-sizing: border-box; font-size: 15px; background: #fff; margin-bottom: 5px; }
        .btn-group { display: flex; gap: 5px; margin-bottom: 10px; }
        .btn { flex: 1; padding: 12px; border: 2px solid #e0e6ed; background: white; border-radius: 10px; cursor: pointer; font-size: 11px; font-weight: bold; color: #666; -webkit-tap-highlight-color: transparent; }
        .btn.active { background: var(--emerald) !important; color: white !important; border-color: var(--emerald) !important; }
        .anter-box { background: #f0fff4; border: 1px dashed var(--dark); padding: 10px; border-radius: 10px; color: var(--dark); font-size: 10px; text-align: center; font-weight: bold; margin: 10px 0; }
        .info-nota { font-size: 10px; color: #777; text-align: center; margin: 5px 0; font-style: italic; }
        .calc-btn { width: 100%; padding: 15px; background: var(--dark); color: white; border: none; border-radius: 15px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .results { display: flex; gap: 8px; margin-top: 15px; }
        .res-box { flex: 1; padding: 12px; border-radius: 15px; border: 2px solid #e0e6ed; text-align: center; background: #fff; }
        .res-box.highlight { border-color: var(--emerald); background: #f0fff4; }
        .res-label { font-size: 8px; font-weight: bold; color: #888; display: block; margin-bottom: 3px; }
        .res-val { font-size: 16px; font-weight: 800; color: var(--dark); }
        .disclaimer { font-size: 9px; color: #999; text-align: justify; margin-top: 15px; line-height: 1.2; }
    </style>
</head>
<body>

<div class="card">
    <h1>Analisi Convenienza</h1>

    <div class="section">Nostra Offerta</div>
    
    <label>Tipo Bolletta</label>
    <div class="btn-group">
        <button type="button" id="m-btn" class="btn active" onclick="setTipo(true)">MENSILE</button>
        <button type="button" id="b-btn" class="btn" onclick="setTipo(false)">BIMESTRALE</button>
    </div>

    <label>Fase Contrattuale</label>
    <div class="btn-group">
        <button type="button" id="p1-btn" class="btn active" onclick="setFase(true)">PRIMI 3 MESI</button>
        <button type="button" id="p2-btn" class="btn" onclick="setFase(false)">DAL 4° MESE</button>
    </div>

    <div id="area-m">
        <label>PUN di riferimento</label>
        <select id="pun-m">
            <option value="0.13266">Gennaio '26 (0,13266)</option>
            <option value="0.11441">Febbraio '26 (0,11441)</option>
            <option value="0.14340">Marzo '26 (0,14340)</option>
        </select>
        <label>Consumo kWh del Mese</label>
        <input type="number" id="kwh-m" placeholder="Esempio: 250">
    </div>

    <div id="area-b" style="display:none;">
        <label>PUN Mesi Selezionati</label>
        <div style="display:flex; gap:5px;">
            <select id="pb1">
                <option value="0.13266">Gen '26</option>
                <option value="0.11441">Feb '26</option>
                <option value="0.14340">Mar '26</option>
            </select>
            <select id="pb2">
                <option value="0.11441" selected>Feb '26</option>
                <option value="0.13266">Gen '26</option>
                <option value="0.14340">Mar '26</option>
            </select>
        </div>
        <div style="display:flex; gap:5px;">
            <div style="flex:1"><label>kWh Mese 1</label><input type="number" id="kb1" placeholder="kWh"></div>
            <div style="flex:1"><label>kWh Mese 2</label><input type="number" id="kb2" placeholder="kWh"></div>
        </div>
    </div>

    <label>N. AMICI INVITATI NELL'ANNO</label>
    <input type="number" id="amici" value="0">

    <div class="anter-box">SOSTIENI L'AMBIENTE CON ANTER (+5€ I° Mese)</div>

    <div class="section old">Vecchio Fornitore</div>
    <label>Quota Consumi (€)</label>
    <input type="number" id="v-c" placeholder="Esempio: 55.20">
    <label>Quota Fissa (€)</label>
    <input type="number" id="v-f" placeholder="Esempio: 12.00">

    <div class="info-nota">* La nostra stima include 0,016509 €/kWh di dispacciamento</div>

    <button type="button" class="calc-btn" onclick="calcola()">ESEGUI CONFRONTO</button>

    <div class="results">
        <div class="res-box">
            <span class="res-label">ATTUALE (MESE)</span>
            <span class="res-val" id="out-v">€ 0.00</span>
        </div>
        <div class="res-box highlight">
            <span class="res-label">STIMA (MESE)</span>
            <span class="res-val" id="out-n">€ 0.00</span>
        </div>
    </div>

    <div class="disclaimer">
        * Il prezzo riportato è solo una fotografia storica e non garantisce risparmi futuri.
    </div>
</div>

<script>
    let modeM = true;
    let faseP = true;

    function setTipo(val) {
        modeM = val;
        document.getElementById('m-btn').classList.toggle('active', val);
        document.getElementById('b-btn').classList.toggle('active', !val);
        document.getElementById('area-m').style.display = val ? 'block' : 'none';
        document.getElementById('area-b').style.display = val ? 'none' : 'block';
    }

    function setFase(val) {
        faseP = val;
        document.getElementById('p1-btn').classList.toggle('active', val);
        document.getElementById('p2-btn').classList.toggle('active', !val);
    }

    function calcola() {
        let k, p;
        if(modeM) {
            k = parseFloat(document.getElementById('kwh-m').value) || 0;
            p = parseFloat(document.getElementById('pun-m').value) || 0;
        } else {
            k = ((parseFloat(document.getElementById('kb1').value) || 0) + (parseFloat(document.getElementById('kb2').value) || 0)) / 2;
            p = (parseFloat(document.getElementById('pb1').value) + parseFloat(document.getElementById('pb2').value)) / 2;
        }

        const spr = 0.0374, dis = 0.016509, ccv = 11.61;
        const nA = parseInt(document.getElementById('amici').value) || 0;
        
        let res = (k * (p + spr + dis)) + ccv;
        if(faseP) { res = res - 10 - (nA * 10); } 
        else { res = res - (nA * 2); }

        let vC = parseFloat(document.getElementById('v-c').value) || 0;
        let vF = parseFloat(document.getElementById('v-f').value) || 0;
        let vT = modeM ? (vC + vF) : ((vC + vF) / 2);

        document.getElementById('out-n').innerText = "€ " + Math.max(0, res).toFixed(2);
        document.getElementById('out-v').innerText = "€ " + vT.toFixed(2);
    }
</script>
</body>
</html>
