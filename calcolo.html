<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotografia Confronto Mese</title>
    <style>
        :root { --emerald: #40b093; --dark-emerald: #2a8a72; --dark: #2c3e50; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--dark); padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 15px 35px rgba(64, 176, 147, 0.1); max-width: 450px; width: 100%; }
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { font-size: 20px; color: var(--dark-emerald); margin: 0; text-transform: uppercase; letter-spacing: 1px; font-weight: 800; }
        label { display: block; font-size: 13px; font-weight: 700; margin-top: 15px; margin-bottom: 5px; color: var(--dark); }
        select, input { width: 100%; padding: 14px; border: 2px solid #e0e6ed; border-radius: 12px; font-size: 16px; box-sizing: border-box; transition: 0.3s; }
        select:focus, input:focus { border-color: var(--emerald); outline: none; }
        .toggle-group { display: flex; gap: 10px; margin-top: 5px; }
        .toggle-btn { flex: 1; padding: 12px; border: 2px solid #e0e6ed; background: white; border-radius: 12px; cursor: pointer; font-weight: 600; font-size: 14px; transition: 0.3s; }
        .toggle-btn.active { background: var(--emerald); color: white; border-color: var(--emerald); }
        .bimestrale-fields { display: none; margin-top: 10px; padding: 15px; background: #f9fbfb; border-radius: 12px; border: 1px solid #e0e6ed; }
        button#calc-btn { width: 100%; padding: 18px; background: var(--emerald); color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: 700; margin-top: 25px; cursor: pointer; box-shadow: 0 5px 15px rgba(64, 176, 147, 0.3); }
        button#calc-btn:active { transform: translateY(2px); }
        .result-card { margin-top: 25px; padding: 20px; background: #f0fff4; border-radius: 15px; border: 2px solid #c6f6d5; text-align: center; }
        .result-val { font-size: 36px; font-weight: 800; color: var(--dark-emerald); }
        .pun-info { font-size: 12px; color: #666; margin-top: 5px; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>FOTOGRAFIA PER CONFRONTO SUL MESE</h1>
    </div>

    <label>Tipo di Bolletta Attuale</label>
    <div class="toggle-group">
        <button class="toggle-btn active" id="type1" onclick="setType(1)">Mensile</button>
        <button class="toggle-btn" id="type2" onclick="setType(2)">Bimestrale</button>
    </div>

    <label>Fase Contrattuale Cliente</label>
    <div class="toggle-group">
        <button class="toggle-btn active" id="period1" onclick="setPeriod(1)">Primi 3 Mesi</button>
        <button class="toggle-btn" id="period2" onclick="setPeriod(2)">Dal 4° Mese</button>
    </div>

    <div id="sectionMensile">
        <label>Mese di Riferimento (Dati GME)</label>
        <select id="punMese1">
            <option value="0.14340">Marzo 2026 (PUN: 0,14340)</option>
            <option value="0.11441">Febbraio 2026 (PUN: 0,11441)</option>
            <option value="0.13266">Gennaio 2026 (PUN: 0,13266)</option>
        </select>
        <label>Consumo kWh Totale Mensile</label>
        <input type="number" id="kwhMese1" placeholder="Es. 300">
    </div>

    <div id="sectionBimestrale" class="bimestrale-fields">
        <label>Seleziona i due mesi della bolletta</label>
        <div style="display: flex; gap: 10px;">
            <select id="punBimes1">
                <option value="0.14340">Marzo '26</option>
                <option value="0.11441">Febbraio '26</option>
                <option value="0.13266">Gennaio '26</option>
            </select>
            <select id="punBimes2">
                <option value="0.11441">Febbraio '26</option>
                <option value="0.14340">Marzo '26</option>
                <option value="0.13266">Gennaio '26</option>
            </select>
        </div>
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <div style="flex: 1;">
                <label style="margin-top:0">CONSUMO MESE 1 (kWh)</label>
                <input type="number" id="kwhBimes1" placeholder="Es. 250">
            </div>
            <div style="flex: 1;">
                <label style="margin-top:0">CONSUMO MESE 2 (kWh)</label>
                <input type="number" id="kwhBimes2" placeholder="Es. 350">
            </div>
        </div>
    </div>

    <label>Numero Amici Invitati</label>
    <input type="number" id="amiciInput" value="0">

    <button id="calc-btn" onclick="calcola()">ESEGUI CONFRONTO</button>

    <div class="result-card">
        <span class="result-val" id="output">-</span><br>
        <span style="color: #2a8a72; font-size: 14px; font-weight: 600;">Costo Mensile Stimato (IVA incl.)</span>
        <div id="infoNota" class="pun-info">Analisi pro-rata mensile</div>
    </div>
</div>

<script>
    let isMensile = true;
    let isPrimiTre = true;

    function setType(t) {
        isMensile = (t === 1);
        document.getElementById('type1').classList.toggle('active', isMensile);
        document.getElementById('type2').classList.toggle('active', !isMensile);
        
        // Switch visivo delle sezioni
        document.getElementById('sectionMensile').style.display = isMensile ? 'block' : 'none';
        document.getElementById('sectionBimestrale').style.display = isMensile ? 'none' : 'block';
    }

    function setPeriod(p) {
        isPrimiTre = (p === 1);
        document.getElementById('period1').classList.toggle('active', isPrimiTre);
        document.getElementById('period2').classList.toggle('active', !isPrimiTre);
    }

    function calcola() {
        let kwhMensileMedio = 0;
        let punMedio = 0;
        const amici = parseFloat(document.getElementById('amiciInput').value) || 0;

        if (isMensile) {
            // Logica Semplice Mensile
            kwhMensileMedio = parseFloat(document.getElementById('kwhMese1').value) || 0;
            punMedio = parseFloat(document.getElementById('punMese1').value) || 0;
        } else {
            // Logica Avanzata Bimestrale
            const kwh1 = parseFloat(document.getElementById('kwhBimes1').value) || 0;
            const kwh2 = parseFloat(document.getElementById('kwhBimes2').value) || 0;
            const pun1 = parseFloat(document.getElementById('punBimes1').value) || 0;
            const pun2 = parseFloat(document.getElementById('punBimes2').value) || 0;

            // Calcoliamo le medie ponderate o semplici per il confronto mensile
            kwhMensileMedio = (kwh1 + kwh2) / 2;
            
            // Per il PUN, se i consumi sono molto diversi, la media ponderata è più onesta.
            // Formula: ((kWh1*PUN1) + (kWh2*PUN2)) / TotalekWh
            if ((kwh1 + kwh2) > 0) {
                punMedio = ((kwh1 * pun1) + (kwh2 * pun2)) / (kwh1 + kwh2);
            } else {
                punMedio = (pun1 + pun2) / 2; // Default se mancano i kWh
            }
        }

        const spread = 0.0374;
        const ccv = 11.61;
        let totale = 0;

        if (isPrimiTre) {
            // Formula: (kWh * (PUN_MEDIO + SPREAD)) + CCV - 10€ - (10€ * AMICO)
            totale = (kwhMensileMedio * (punMedio + spread)) + ccv - 10 - (10 * amici);
        } else {
            // Formula: (kWh * (PUN_MEDIO + SPREAD)) + CCV - (2€ * AMICO)
            totale = (kwhMensileMedio * (punMedio + spread)) + ccv - (2 * amici);
        }

        const finale = totale < 0 ? 0 : totale;
        document.getElementById('output').innerText = "€ " + finale.toFixed(2);
        
        let notaSottotitolo = isMensile ? "Calcolo su base mensile" : "Media bimestrale pro-rata mensile";
        document.getElementById('infoNota').innerText = notaSottotitolo;
    }
</script>

</body>
</html>
